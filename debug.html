const normalizeText = (text) => text.normalize('NFKC').trim();

function sha256(data) {
  const bytes = typeof data === 'string' ? strToBytes(data) : data;
  let h0 = 0x6a09e667, h1 = 0xbb67ae85, h2 = 0x3c6ef372, h3 = 0xa54ff53a;
  let h4 = 0x510e527f, h5 = 0x9b05688c, h6 = 0x1f83d9ab, h7 = 0x5be0cd19;
  
  const k = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
  ];
  
  const strToBytes = (str) => {
    if (typeof str !== 'string') return new Uint8Array(0);
    const bytes = [];
    for (let i = 0; i < str.length; i++) {
      const char = str.charCodeAt(i);
      if (char < 0x80) bytes.push(char);
      else if (char < 0x800) {
        bytes.push(0xc0 | (char >> 6), 0x80 | (char & 0x3f));
      } else if (char < 0x10000) {
        bytes.push(0xe0 | (char >> 12), 0x80 | ((char >> 6) & 0x3f), 0x80 | (char & 0x3f));
      } else {
        bytes.push(0xf0 | (char >> 18), 0x80 | ((char >> 12) & 0x3f), 0x80 | ((char >> 6) & 0x3f), 0x80 | (char & 0x3f));
      }
    }
    return bytes;
  };
  
  const padded = new Uint8Array(((bytes.length + 9 + 63) >> 6) << 6);
  padded.set(bytes);
  padded[bytes.length] = 0x80;
  const bitLen = bytes.length * 8;
  padded[padded.length - 4] = (bitLen >>> 24) & 0xff;
  padded[padded.length - 3] = (bitLen >>> 16) & 0xff;
  padded[padded.length - 2] = (bitLen >>> 8) & 0xff;
  padded[padded.length - 1] = bitLen & 0xff;
  
  for (let chunk = 0; chunk < padded.length; chunk += 64) {
    const w = new Uint32Array(64);
    for (let i = 0; i < 16; i++) {
      w[i] = (padded[chunk + i * 4] << 24) | (padded[chunk + i * 4 + 1] << 16) |
             (padded[chunk + i * 4 + 2] << 8) | padded[chunk + i * 4 + 3];
    }
    for (let i = 16; i < 64; i++) {
      const s0 = (w[i-15] >>> 7) | (w[i-15] << 25) ^ (w[i-15] >>> 18) | (w[i-15] << 14) ^ (w[i-15] >>> 3);
      const s1 = (w[i-2] >>> 17) | (w[i-2] << 15) ^ (w[i-2] >>> 19) | (w[i-2] << 13) ^ (w[i-2] >>> 10);
      w[i] = (w[i-16] + s0 + w[i-7] + s1) >>> 0;
    }
    
    let a = h0, b = h1, c = h2, d = h3, e = h4, f = h5, g = h6, hh = h7;
    for (let i = 0; i < 64; i++) {
      const S1 = (e >>> 6) | (e << 26) ^ (e >>> 11) | (e << 21) ^ (e >>> 25) | (e << 7);
      const ch = (e & f) ^ (~e & g);
      const temp1 = (hh + S1 + ch + k[i] + w[i]) >>> 0;
      const S0 = (a >>> 2) | (a << 30) ^ (a >>> 13) | (a << 19) ^ (a >>> 22) | (a << 10);
      const maj = (a & b) ^ (a & c) ^ (b & c);
      const temp2 = (S0 + maj) >>> 0;
      hh = g; g = f; f = e; e = (d + temp1) >>> 0; d = c; c = b; b = a; a = (temp1 + temp2) >>> 0;
    }
    h0 = (h0 + a) >>> 0; h1 = (h1 + b) >>> 0; h2 = (h2 + c) >>> 0; h3 = (h3 + d) >>> 0;
    h4 = (h4 + e) >>> 0; h5 = (h5 + f) >>> 0; h6 = (h6 + g) >>> 0; h7 = (h7 + hh) >>> 0;
  }
  
  return new Uint8Array([
    (h0 >>> 24) & 0xff, (h0 >>> 16) & 0xff, (h0 >>> 8) & 0xff, h0 & 0xff,
    (h1 >>> 24) & 0xff, (h1 >>> 16) & 0xff, (h1 >>> 8) & 0xff, h1 & 0xff,
    (h2 >>> 24) & 0xff, (h2 >>> 16) & 0xff, (h2 >>> 8) & 0xff, h2 & 0xff,
    (h3 >>> 24) & 0xff, (h3 >>> 16) & 0xff, (h3 >>> 8) & 0xff, h3 & 0xff,
    (h4 >>> 24) & 0xff, (h4 >>> 16) & 0xff, (h4 >>> 8) & 0xff, h4 & 0xff,
    (h5 >>> 24) & 0xff, (h5 >>> 16) & 0xff, (h5 >>> 8) & 0xff, h5 & 0xff,
    (h6 >>> 24) & 0xff, (h6 >>> 16) & 0xff, (h6 >>> 8) & 0xff, h6 & 0xff,
    (h7 >>> 24) & 0xff, (h7 >>> 16) & 0xff, (h7 >>> 8) & 0xff, h7 & 0xff
  ]);
}

const password = normalizeText('你好');
const salt = 'HAnWordPWA::';

const strToBytes = (str) => {
  if (typeof str !== 'string') return new Uint8Array(0);
  const bytes = [];
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    if (char < 0x80) bytes.push(char);
    else if (char < 0x800) {
      bytes.push(0xc0 | (char >> 6), 0x80 | (char & 0x3f));
    } else if (char < 0x10000) {
      bytes.push(0xe0 | (char >> 12), 0x80 | ((char >> 6) & 0x3f), 0x80 | (char & 0x3f));
    } else {
      bytes.push(0xf0 | (char >> 18), 0x80 | ((char >> 12) & 0x3f), 0x80 | ((char >> 6) & 0x3f), 0x80 | (char & 0x3f));
    }
  }
  return new Uint8Array(bytes);
};

const concatBytes = (a, b) => {
  const c = new Uint8Array(a.length + b.length);
  c.set(a); c.set(b, a.length);
  return c;
};

const BLOCK_SIZE = 64;
const PBKDF2_ITERATIONS = 210000;

const passwordBytes = strToBytes(password);
const saltBytes = strToBytes(salt);

document.body.innerHTML = '<pre>password bytes: ' + JSON.stringify([...passwordBytes]) + '</pre>';
document.body.innerHTML += '<pre>salt bytes: ' + JSON.stringify([...saltBytes]) + '</pre>';

// HMAC
const keyBytes = passwordBytes;
let keyToHash = keyBytes;
if (keyBytes.length > BLOCK_SIZE) {
  keyToHash = sha256(keyBytes);
}

const ipad = new Uint8Array(BLOCK_SIZE);
const opad = new Uint8Array(BLOCK_SIZE);
for (let i = 0; i < BLOCK_SIZE; i++) {
  const kb = i < keyToHash.length ? keyToHash[i] : 0;
  ipad[i] = kb ^ 0x36;
  opad[i] = kb ^ 0x5c;
}

const innerHash = sha256(concatBytes(ipad, saltBytes));
const hmacResult = sha256(concatBytes(opad, innerHash));

document.body.innerHTML += '<pre>HMAC (1st): ' + JSON.stringify([...hmacResult]) + '</pre>';

// PBKDF2 first iteration
let u = hmacResult;
let result = new Uint8Array(u);

document.body.innerHTML += '<pre>u after 1st: ' + JSON.stringify([...u]) + '</pre>';

// Second iteration - HMAC(key, u)
const keyToHash2 = passwordBytes.length > BLOCK_SIZE ? sha256(passwordBytes) : passwordBytes;
const ipad2 = new Uint8Array(BLOCK_SIZE);
const opad2 = new Uint8Array(BLOCK_SIZE);
for (let i = 0; i < BLOCK_SIZE; i++) {
  const kb = i < keyToHash2.length ? keyToHash2[i] : 0;
  ipad2[i] = kb ^ 0x36;
  opad2[i] = kb ^ 0x5c;
}
const innerHash2 = sha256(concatBytes(ipad2, u));
const u2 = sha256(concatBytes(opad2, innerHash2));

document.body.innerHTML += '<pre>u after 2nd: ' + JSON.stringify([...u2]) + '</pre>';
